<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 400" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#607D8B"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#9AA7B1" flood-opacity="0.5"/>
    </filter>
  </defs>

  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A2733">VCF 9.1 License Flow</text>
  <text x="490" y="58" text-anchor="middle" font-size="13" fill="#5A6872">From your Broadcom subscription down to individual ESX hosts</text>

  <!-- top callout -->
  <rect x="290" y="84" width="400" height="44" rx="22" fill="#FFF7E6" stroke="#E0A800" stroke-width="1.5"/>
  <text x="490" y="104" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#7A5B00">VCF Subscription  →  Default license pool</text>
  <text x="490" y="120" text-anchor="middle" font-size="11" fill="#7A5B00">per core (VCF) / per TiB (vSAN), one pool per product &amp; Site ID</text>
  <line x1="490" y1="128" x2="490" y2="158" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- stage boxes -->
  <g filter="url(#shadow)">
    <rect x="20"  y="200" width="166" height="92" rx="10" fill="#FCE8EC" stroke="#CC092F" stroke-width="2"/>
    <rect x="223" y="200" width="166" height="92" rx="10" fill="#EDE7F6" stroke="#6A1B9A" stroke-width="2"/>
    <rect x="426" y="200" width="166" height="92" rx="10" fill="#E1F1FB" stroke="#0091DA" stroke-width="2"/>
    <rect x="629" y="200" width="166" height="92" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="2"/>
    <rect x="812" y="200" width="148" height="92" rx="10" fill="#ECEFF1" stroke="#546E7A" stroke-width="2"/>
  </g>

  <!-- stage 1 -->
  <text x="103" y="232" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#8E0A26">VCF Business</text>
  <text x="103" y="249" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#8E0A26">Services console</text>
  <text x="103" y="272" text-anchor="middle" font-size="10.5" fill="#8E0A26">vcf.broadcom.com</text>
  <!-- stage 2 -->
  <text x="306" y="232" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#4A148C">License Server</text>
  <text x="306" y="249" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#4A148C">appliance</text>
  <text x="306" y="272" text-anchor="middle" font-size="10.5" fill="#4A148C">stores entitlements</text>
  <!-- stage 3 -->
  <text x="509" y="240" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#00628F">VCF Operations</text>
  <text x="509" y="265" text-anchor="middle" font-size="10.5" fill="#00628F">manage &amp; assign</text>
  <!-- stage 4 -->
  <text x="712" y="240" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#00695C">vCenter</text>
  <text x="712" y="265" text-anchor="middle" font-size="10.5" fill="#00695C">gets primary license</text>
  <!-- stage 5 -->
  <text x="886" y="240" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#37474F">ESX Hosts</text>
  <text x="886" y="265" text-anchor="middle" font-size="10.5" fill="#37474F">licensed</text>
  <text x="886" y="279" text-anchor="middle" font-size="10.5" fill="#37474F">automatically</text>

  <!-- arrows between stages -->
  <line x1="186" y1="246" x2="221" y2="246" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="389" y1="246" x2="424" y2="246" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="592" y1="246" x2="627" y2="246" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="795" y1="246" x2="810" y2="246" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- bottom annotations -->
  <text x="245" y="330" text-anchor="middle" font-size="11" fill="#5A6872">licenses added</text>
  <text x="448" y="330" text-anchor="middle" font-size="11" fill="#5A6872">register &amp; pull</text>
  <text x="610" y="330" text-anchor="middle" font-size="11" fill="#5A6872">assign primary /</text>
  <text x="610" y="344" text-anchor="middle" font-size="11" fill="#5A6872">add-on license</text>
  <text x="887" y="330" text-anchor="middle" font-size="11" fill="#5A6872">inherit license</text>

  <text x="490" y="384" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8090A0">Assign one primary license to vCenter and every connected host is licensed automatically.</text>
</svg>
