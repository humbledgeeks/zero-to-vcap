<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#607D8B"/>
    </marker>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#9AA7B1" flood-opacity="0.5"/>
    </filter>
  </defs>

  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A2733">License Types in VCF 9.1</text>
  <text x="490" y="58" text-anchor="middle" font-size="13" fill="#5A6872">Assign a primary license first, then layer on add-ons</text>

  <!-- default pool -->
  <g filter="url(#shadow2)">
    <rect x="320" y="80" width="340" height="62" rx="10" fill="#FFF7E6" stroke="#E0A800" stroke-width="2"/>
  </g>
  <text x="490" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#7A5B00">Default license pool</text>
  <text x="490" y="126" text-anchor="middle" font-size="11" fill="#7A5B00">one per product, per Site ID — split as needed</text>

  <!-- split arrows -->
  <line x1="430" y1="142" x2="250" y2="186" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="550" y1="142" x2="730" y2="186" stroke="#607D8B" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- PRIMARY column -->
  <g filter="url(#shadow2)">
    <rect x="60" y="190" width="380" height="56" rx="9" fill="#E1F1FB" stroke="#0091DA" stroke-width="2"/>
  </g>
  <text x="250" y="214" text-anchor="middle" font-size="14" font-weight="bold" fill="#00628F">PRIMARY licenses</text>
  <text x="250" y="233" text-anchor="middle" font-size="11" fill="#00628F">assigned to a vCenter — required first</text>

  <g filter="url(#shadow2)">
    <rect x="80" y="262" width="160" height="58" rx="8" fill="#FFFFFF" stroke="#0091DA" stroke-width="1.5"/>
    <rect x="262" y="262" width="160" height="58" rx="8" fill="#FFFFFF" stroke="#0091DA" stroke-width="1.5"/>
  </g>
  <text x="160" y="287" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#00628F">VMware Cloud</text>
  <text x="160" y="303" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#00628F">Foundation (cores)</text>
  <text x="342" y="287" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#00628F">VMware vSphere</text>
  <text x="342" y="303" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#00628F">Foundation</text>

  <!-- ADD-ON column -->
  <g filter="url(#shadow2)">
    <rect x="540" y="190" width="380" height="56" rx="9" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  </g>
  <text x="730" y="214" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">ADD-ON licenses</text>
  <text x="730" y="233" text-anchor="middle" font-size="11" fill="#1B5E20">only after a primary is assigned</text>

  <g filter="url(#shadow2)">
    <rect x="560" y="262" width="160" height="58" rx="8" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="742" y="262" width="160" height="58" rx="8" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.5"/>
  </g>
  <text x="640" y="295" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1B5E20">VMware vSAN (TiB)</text>
  <text x="822" y="280" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1B5E20">Private AI Foundation</text>
  <text x="822" y="296" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1B5E20">with NVIDIA (cores)</text>

  <!-- override callout -->
  <g filter="url(#shadow2)">
    <rect x="240" y="356" width="500" height="60" rx="10" fill="#FBE9E7" stroke="#D84315" stroke-width="2"/>
  </g>
  <text x="490" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#BF360C">OVERRIDE license</text>
  <text x="490" y="399" text-anchor="middle" font-size="11" fill="#BF360C">pinned directly to one asset (ESX host / vSAN cluster),</text>
  <text x="490" y="412" text-anchor="middle" font-size="11" fill="#BF360C">overriding the license inherited from vCenter</text>
</svg>
