<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#607D8B"/>
    </marker>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#9AA7B1" flood-opacity="0.5"/>
    </filter>
  </defs>

  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A2733">The Licensing Workflow, End to End</text>
  <text x="490" y="58" text-anchor="middle" font-size="13" fill="#5A6872">Three phases from evaluation to fully licensed</text>

  <!-- phase columns -->
  <g filter="url(#shadow3)">
    <rect x="30"  y="86" width="280" height="312" rx="12" fill="#F4F7FA" stroke="#90A4AE" stroke-width="1.5"/>
    <rect x="350" y="86" width="280" height="312" rx="12" fill="#F4F7FA" stroke="#90A4AE" stroke-width="1.5"/>
    <rect x="670" y="86" width="280" height="312" rx="12" fill="#F4F7FA" stroke="#90A4AE" stroke-width="1.5"/>
  </g>

  <!-- phase headers -->
  <rect x="30"  y="86" width="280" height="40" rx="12" fill="#CC092F"/>
  <rect x="350" y="86" width="280" height="40" rx="12" fill="#6A1B9A"/>
  <rect x="670" y="86" width="280" height="40" rx="12" fill="#00897B"/>
  <rect x="30"  y="106" width="280" height="20" fill="#CC092F"/>
  <rect x="350" y="106" width="280" height="20" fill="#6A1B9A"/>
  <rect x="670" y="106" width="280" height="20" fill="#00897B"/>
  <text x="170" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">1 · PREPARE</text>
  <text x="490" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">2 · REGISTER &amp; LOAD</text>
  <text x="810" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">3 · ASSIGN &amp; VERIFY</text>

  <!-- phase 1 chips -->
  <g font-size="11.5" fill="#37474F">
    <rect x="50" y="146" width="240" height="46" rx="7" fill="#FFFFFF" stroke="#CC092F" stroke-width="1.3"/>
    <text x="170" y="166" text-anchor="middle" font-weight="bold">Reconcile core count</text>
    <text x="170" y="182" text-anchor="middle">cores you have vs. cores you bought</text>

    <rect x="50" y="206" width="240" height="46" rx="7" fill="#FFFFFF" stroke="#CC092F" stroke-width="1.3"/>
    <text x="170" y="226" text-anchor="middle" font-weight="bold">Confirm License Server</text>
    <text x="170" y="242" text-anchor="middle">auto-deployed on a fresh 9.1 install</text>
  </g>

  <!-- phase 2 chips -->
  <g font-size="11.5" fill="#37474F">
    <rect x="370" y="146" width="240" height="42" rx="7" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.3"/>
    <text x="490" y="172" text-anchor="middle" font-weight="bold">Register VCF Ops (Connected)</text>

    <rect x="370" y="200" width="240" height="42" rx="7" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.3"/>
    <text x="490" y="226" text-anchor="middle" font-weight="bold">Activation code → Activate</text>

    <rect x="370" y="254" width="240" height="42" rx="7" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.3"/>
    <text x="490" y="280" text-anchor="middle" font-weight="bold">Add licenses to License Server</text>

    <rect x="370" y="308" width="240" height="42" rx="7" fill="#FFFFFF" stroke="#6A1B9A" stroke-width="1.3"/>
    <text x="490" y="334" text-anchor="middle" font-weight="bold">Download / import license file</text>
  </g>

  <!-- phase 3 chips -->
  <g font-size="11.5" fill="#37474F">
    <rect x="690" y="146" width="240" height="46" rx="7" fill="#FFFFFF" stroke="#00897B" stroke-width="1.3"/>
    <text x="810" y="166" text-anchor="middle" font-weight="bold">Assign primary license</text>
    <text x="810" y="182" text-anchor="middle">to each vCenter — hosts inherit it</text>

    <rect x="690" y="206" width="240" height="46" rx="7" fill="#FFFFFF" stroke="#00897B" stroke-width="1.3"/>
    <text x="810" y="226" text-anchor="middle" font-weight="bold">Assign add-on licenses</text>
    <text x="810" y="242" text-anchor="middle">vSAN (TiB), Private AI (cores)</text>

    <rect x="690" y="266" width="240" height="46" rx="7" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.6"/>
    <text x="810" y="286" text-anchor="middle" font-weight="bold" fill="#1B5E20">Verify: Registered / Connected</text>
    <text x="810" y="302" text-anchor="middle" fill="#1B5E20">no host in evaluation, banner gone</text>
  </g>

  <!-- phase arrows -->
  <line x1="310" y1="242" x2="349" y2="242" stroke="#607D8B" stroke-width="2.5" marker-end="url(#arrow3)"/>
  <line x1="630" y1="242" x2="669" y2="242" stroke="#607D8B" stroke-width="2.5" marker-end="url(#arrow3)"/>
</svg>
